Angellist:
  Enabled: true

Angellist/EnforceMethodCallSites:
  Enabled: true
  Description: "Prevent methods from being called in places you don't allow"
  VersionAdded: "1.1.3"

Angellist/NoUnless:
  Enabled: true
  Description: "Always prefer `if` over `unless`."
  VersionAdded: "1.0.0"

Angellist/PreferDateCurrent:
  Description: "Prefer Date.current over Time.zone.today"
  Enabled: true
  VersionAdded: "1.0.2"

Angellist/ForbidInstanceVariableGetSet:
  Description: "Forbids the use of instance_variable_get and instance_variable_set"
  Enabled: false
  VersionAdded: "1.0.3"

Angellist/TimecopWithoutBlock:
  Description: "Always use the block form of Timecop.freeze and Timecop.travel."
  Enabled: true
  VersionAdded: "1.1.4"

Angellist/RedundantExtendTSig:
  Description: "Remove unnecessary `extend T::Sig` since `sig` is monkey-patched into Module."
  Enabled: true
  VersionAdded: "1.1.5"
  SafeAutoCorrect: true

Angellist/GraphqlExplicitMethod:
  Description: "Require explicit `method:` or `resolver_method:` on snake_case GraphQL fields."
  Enabled: true
  VersionAdded: "1.1.6"
  Include:
    - 'app/graphql/**/*.rb'
    - 'backend/**/app/graphql/**/*.rb'

Angellist/GraphqlResolverMethod:
  Description: "Use `resolver_method:` instead of `method:` when the type class defines a custom resolver def for the field."
  Enabled: true
  VersionAdded: "1.1.6"
  SafeAutoCorrect: true
  Include:
    - 'app/graphql/**/*.rb'
    - 'backend/**/app/graphql/**/*.rb'

Angellist/ClassStructure:
  Description: "Enforces strict class ordering (built ontop of Layout::ClassStructure)"
  Enabled: true
  VersionAdded: "1.0.4"
  Severity: warning
  SafeAutoCorrect: false
  ExpectedOrder:
    - module_inclusion
    - graphql_object_types
    - constants
    - nested_classes
    - public_class_methods
    - graphql_fields
    - public_methods
    - protected_methods
    - private_methods
  Categories:
    module_inclusion:
      - extend
      - include
      - prepend
    graphql_object_types:
      - object_type
    constants:
      - casgn
    graphql_fields:
      - implements
      - field
    nested_classes:
      - class
      - module
    public_class_methods:
      - sclass
    public_methods:
      - def
    protected_methods:
      - protected
    private_methods:
      - private
